version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: chess_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - chess_net

  bot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chess_bot
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-development}
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - APP_LOG_LEVEL=${APP_LOG_LEVEL:-INFO}
      - APP_SECRET_KEY=${APP_SECRET_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_GAME_TTL_SECONDS=${REDIS_GAME_TTL_SECONDS:-86400}
      - STOCKFISH_PATH=${STOCKFISH_PATH:-/usr/games/stockfish}
      - STOCKFISH_WORKERS=${STOCKFISH_WORKERS:-4}
      - STOCKFISH_THREADS=${STOCKFISH_THREADS:-1}
      - STOCKFISH_HASH_MB=${STOCKFISH_HASH_MB:-32}
    networks:
      - chess_net

volumes:
  redis_data:

networks:
  chess_net:
    driver: bridge
