version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: chess_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - chess_net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chess_api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-development}
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - APP_LOG_LEVEL=${APP_LOG_LEVEL:-INFO}
      - APP_SECRET_KEY=${APP_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRES_MINUTES=${JWT_EXPIRES_MINUTES:-1440}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME}
      - TELEGRAM_WEBAPP_URL=${TELEGRAM_WEBAPP_URL}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_GAME_TTL_SECONDS=${REDIS_GAME_TTL_SECONDS:-86400}
      - STOCKFISH_PATH=${STOCKFISH_PATH:-/usr/games/stockfish}
      - STOCKFISH_WORKERS=${STOCKFISH_WORKERS:-4}
      - STOCKFISH_THREADS=${STOCKFISH_THREADS:-1}
      - STOCKFISH_HASH_MB=${STOCKFISH_HASH_MB:-32}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-30}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read(); sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chess_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-/ws}
    container_name: chess_frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - chess_net

  nginx:
    image: nginx:1.27-alpine
    container_name: chess_nginx
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - chess_net

volumes:
  redis_data:

networks:
  chess_net:
    driver: bridge
